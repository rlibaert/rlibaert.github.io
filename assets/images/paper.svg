<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise-texture">
        <feTurbulence
            type="fractalNoise"
            baseFrequency="0.5"
            numOctaves="2"
            seed="12"
            stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
            <feFuncA type="discrete" tableValues="0 0.05"/>
        </feComponentTransfer>
        <feBlend mode="multiply" in="SourceGraphic"/>
    </filter>
    <rect width="100%" height="100%" fill="none" filter="url(#noise-texture)"/>
</svg>
